{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Members</h2>
    <a href="{% url 'member_create' %}" class="btn btn-primary">Add Member</a>
</div>
<div class="table-responsive">
    <table class="table table-striped table-bordered">
        <thead class="table-dark">
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for member in members %}
            <tr>
                <td>{{ member.name }}</td>
                <td>{{ member.email }}</td>
                <td>{{ member.phone }}</td>
                <td>
                    <a href="{% url 'member_edit' member.pk %}" class="btn btn-sm btn-outline-secondary">Edit</a>
                    <a href="{% url 'member_delete' member.pk %}" class="btn btn-sm btn-outline-danger">Delete</a>
                </td>
            </tr>
            {% empty %}
            <tr><td colspan="4" class="text-center">No members found.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
