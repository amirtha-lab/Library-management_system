{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Books</h2>
    <a href="{% url 'book_create' %}" class="btn btn-primary">Add Book</a>
</div>
<form method="get" class="mb-3">
    <input type="text" name="q" class="form-control" placeholder="Search books" value="{{ request.GET.q }}">
</form>
<div class="table-responsive">
    <table class="table table-striped table-bordered">
        <thead class="table-dark">
            <tr>
                <th>Title</th>
                <th>Author</th>
                <th>ISBN</th>
                <th>Category</th>
                <th>Quantity</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for book in books %}
            <tr>
                <td>{{ book.title }}</td>
                <td>{{ book.author }}</td>
                <td>{{ book.isbn }}</td>
                <td>{{ book.category }}</td>
                <td>{{ book.quantity }}</td>
                <td>
                    <a href="{% url 'book_edit' book.pk %}" class="btn btn-sm btn-outline-secondary">Edit</a>
                    <a href="{% url 'book_delete' book.pk %}" class="btn btn-sm btn-outline-danger">Delete</a>
                </td>
            </tr>
            {% empty %}
            <tr><td colspan="6" class="text-center">No books found.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
